spring:
  application:
    name: internship-tool

  cache:
    type: redis
    redis:
      time-to-live: 10m
      cache-null-values: false

  # Multipart Upload Configuration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Database Configuration
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # JPA & Hibernate
  jpa:
    hibernate:
      ddl-auto: update # Temporarily use update since Flyway is disabled
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true

  # Flyway Database Migrations
  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # Mail Configuration
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Custom JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000} # Default 24 hours

# Server Configuration
server:
  port: ${SERVER_PORT:8080}

# File Upload Configuration
file:
  upload-dir: uploads
